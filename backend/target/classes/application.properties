server.port=8000

# Upload / cache directories (relative to working directory)
app.upload-dir=uploads
app.cache-dir=cache

# Whisper model size: tiny | base | small | medium | large-v2
app.whisper-model=${WHISPER_MODEL_SIZE:base}

# Demucs model
app.demucs-model=${DEMUCS_MODEL:htdemucs}

# Set to true to skip Demucs vocal isolation (~10x faster, slight accuracy cost)
app.skip-vocal-isolation=${SKIP_VOCAL_ISOLATION:false}

# Max file upload size (Spring default is 1MB — raise for audio files)
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# Logging
logging.level.com.lyrictranslate=INFO
